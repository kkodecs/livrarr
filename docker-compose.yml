services:
  livrarr:
    image: ghcr.io/kkodecs/livrarr:0.1.0-alpha1   # pin to a specific release; avoid :latest for alpha
    container_name: livrarr
    ports:
      - 8789:8789
    volumes:
      - ./config:/config           # database, covers, config.toml
      - /path/to/books:/books      # your ebook/audiobook library root
      - /path/to/downloads:/downloads  # download client complete dir
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8789/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
